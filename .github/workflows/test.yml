name: Test
on:
  push:
    branches: [ '*' ]
  pull_request:

env:
  JAVA_VERSION: 21

jobs:
  buildJava:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'microsoft'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew
      - name: Build with Gradle
        run: ./gradlew build --rerun-tasks --stacktrace
      - name: Create native artifact
        run: ./gradlew copyForNative --rerun-tasks --stacktrace
      - name: Store native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-quilt-installer-jar-${{ github.sha }}
          path: build/native-quilt-installer.jar

  buildNatives:
    needs: buildJava
    strategy:
      matrix:
        target: [ x86_64, i686, aarch64 ]
    runs-on: windows-latest
    env:
      QUILT_INSTALLER_JAR_PATH: jars/native-quilt-installer.jar
    steps:
      # TODO: Fix macOS in future
      - uses: actions/checkout@v4
      - name: download native jar
        uses: actions/download-artifact@v4
        with:
          name: native-quilt-installer-jar-${{ github.sha }}
          path: ./native/jars
      - run: rustup target add ${{ matrix.target }}-pc-windows-msvc
      - name: Run Cargo Build
        run: cargo build --target ${{ matrix.target }}-pc-windows-msvc
        working-directory: ./native
      - uses: actions/upload-artifact@v4
        with:
          name: Native Installer ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/quilt-installer.exe
      - name: Run Cargo Check
        run: cargo check --target ${{ matrix.target }}-pc-windows-msvc
        working-directory: ./native
